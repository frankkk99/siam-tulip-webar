<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#06110a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>AR ดอกกระเจียวแดง</title>
  <link rel="stylesheet" href="css/site.css" />
  <link rel="preload" href="assets/siam-tulip-loop.mp4" as="video" type="video/mp4" />

  <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/gh/8thwall/aframe-world-effects-example@main/external/scripts/8frame-1.5.0.min.js"></script>
  <script crossorigin="anonymous" async src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" data-preload-chunks="slam"></script>

  <script src="js/ar-shader.js"></script>
  <script src="js/settings-store.js"></script>
  <script src="js/media-store.js"></script>
  <script src="js/world-ar.js"></script>

  <!-- This product includes the XR Engine software developed by Niantic Spatial, Inc.
       Copyright © 2026 Niantic Spatial, Inc. All rights reserved.
       License: https://github.com/8thwall/engine/blob/main/LICENSE -->
</head>
<body>
  <div id="worldStartScreen" class="start-screen world-start-screen">
    <div class="card">
      <img id="worldPoster" class="poster" src="assets/poster.jpg" alt="ดอกกระเจียวแดง" />
      <h1 id="worldTitle">AR ดอกกระเจียวแดง</h1>
      <p id="worldDescription">เปิดกล้องแล้วหันโทรศัพท์ลงที่พื้นกลางห้อง</p>
      <button id="startWorldButton" class="start" type="button">เริ่มเปิดกล้อง AR</button>
      <a id="liteFallbackButton" class="button fallback-button" href="lite.html" hidden>เปิดโหมดกล้องสำรอง</a>
      <div id="worldStartError" class="start-error" hidden></div>
      <div id="worldHint" class="hint">รองรับ Safari บน iPhone และ Chrome บน Android กรุณาอนุญาตกล้องและการเคลื่อนไหว</div>
    </div>
  </div>

  <div id="ui" class="ui" aria-live="polite">
    <div class="topbar"><div id="status" class="status">รอเริ่มเปิดกล้อง…</div></div>

    <div id="floorGuide" class="floor-guide" hidden>
      <span class="floor-guide-ring"></span>
      <small id="guideText">หันกล้องลงพื้นกลางห้อง แล้วขยับโทรศัพท์ช้า ๆ</small>
    </div>

    <div class="controls">
      <button id="placeButton" type="button" hidden>วางดอกไม้ตรงนี้</button>
      <button id="repositionButton" type="button" hidden>ย้ายตำแหน่ง</button>
      <button id="recenterButton" type="button" hidden>ตั้งพื้นใหม่</button>
      <button id="replayButton" type="button" hidden>เล่นใหม่</button>
    </div>
    <div id="errorBox" class="error-box" hidden></div>
  </div>

  <a-scene
    id="arScene"
    siam-world-placement
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="colorManagement: true; alpha: true; antialias: true"
    xrconfig
    xrweb="allowedDevices: any">

    <a-assets timeout="30000">
      <video id="flowerVideo" src="assets/siam-tulip-loop.mp4" preload="auto" loop muted playsinline webkit-playsinline crossorigin="anonymous"></video>
    </a-assets>

    <a-camera id="camera" position="0 1.6 0" look-controls="enabled: false"></a-camera>

    <a-entity id="reticle" visible="false" position="0 0.015 -2">
      <a-ring radius-inner="0.075" radius-outer="0.105" rotation="-90 0 0" material="color: #ffffff; shader: flat; opacity: 0.92; transparent: true"></a-ring>
      <a-ring radius-inner="0.115" radius-outer="0.122" rotation="-90 0 0" material="color: #28a85f; shader: flat; opacity: 0.72; transparent: true"></a-ring>
    </a-entity>

    <a-entity id="flowerRoot" visible="false">
      <a-plane
        id="flowerPlane"
        position="0 0.52 0"
        width="1.62"
        height="0.91"
        face-camera-y
        material="shader: chromakey; src: #flowerVideo; keyColor: #047EF7; similarity: 0.060; smoothness: 0.115; spill: 0.85; transparent: true; side: double; depthWrite: false">
      </a-plane>
    </a-entity>
  </a-scene>
</body>
</html>
