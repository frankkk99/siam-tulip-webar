<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>มาร์กเกอร์ AR ดอกกระเจียวแดง</title>
  <style>
    body { margin: 0; padding: 24px; background: #edf4ee; color: #102217; font-family: system-ui, -apple-system, "Noto Sans Thai", sans-serif; text-align: center; }
    main { width: min(760px, 100%); margin: auto; background: white; padding: 28px; border-radius: 24px; box-shadow: 0 18px 60px rgba(0,0,0,.12); }
    h1 { margin: 0 0 8px; }
    p { color: #526158; line-height: 1.55; }
    img { width: min(560px, 100%); display: block; margin: 20px auto; }
    a { display: inline-block; padding: 12px 18px; border-radius: 14px; background: #208b50; color: white; text-decoration: none; font-weight: 700; }
    @media print { body { padding: 0; background: white; } main { box-shadow: none; width: 100%; padding: 0; } a, p { display: none; } img { width: 18cm; } }
  </style>
</head>
<body>
  <main>
    <h1>มาร์กเกอร์ AR ดอกกระเจียวแดง</h1>
    <p>พิมพ์ภาพนี้ วางราบบนพื้น และอย่าตัดขอบสีขาวรอบนอก แนะนำขนาดมาร์กเกอร์อย่างน้อย 15–20 ซม.</p>
    <img src="assets/hiro-marker.png" alt="Hiro AR marker" />
    <a href="assets/hiro-marker-print-a4.png" download>เปิดไฟล์สำหรับพิมพ์ A4</a>
  </main>
</body>
</html>
