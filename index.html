<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#06110a" />
  <title>กำลังเปิด Web AR…</title>
  <script src="js/settings-store.js"></script>
</head>
<body>
  <p style="font-family:system-ui;padding:24px">กำลังเปิดระบบ AR…</p>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const useDraft = params.get('preview') === 'draft';
      const settings = useDraft
        ? window.SiamTulipSettings.getDraft()
        : window.SiamTulipSettings.getPublished();
      const requestedMode = params.get('mode');
      const mode = requestedMode || settings.ar.trackingMode || 'world';
      params.delete('mode');
      const query = params.toString();
      const target = mode === 'marker' ? 'marker-ar.html' : 'world.html';
      location.replace(`${target}${query ? `?${query}` : ''}`);
    })();
  </script>
</body>
</html>
