<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#07130c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>AR ดอกกระเจียวแดง</title>
  <link rel="preload" href="assets/siam-tulip-loop.mp4" as="video" type="video/mp4" />
  <script src="vendor/aframe-1.6.0.min.js"></script>
  <script src="vendor/aframe-ar-3.4.8.js"></script>
  <style>
    :root { color-scheme: dark; font-family: system-ui, -apple-system, "Noto Sans Thai", sans-serif; }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #07130c; }
    body { touch-action: manipulation; }
    .ui { position: fixed; inset: 0; z-index: 20; pointer-events: none; }
    .topbar { position: absolute; top: max(12px, env(safe-area-inset-top)); left: 12px; right: 12px; display: flex; justify-content: center; }
    .status { max-width: 92vw; padding: 10px 14px; border: 1px solid rgba(255,255,255,.22); border-radius: 999px; background: rgba(3,18,10,.72); backdrop-filter: blur(14px); color: white; font-size: 14px; line-height: 1.35; text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,.25); }
    .status.found { background: rgba(12,89,43,.82); }
    .controls { position: absolute; left: 12px; right: 12px; bottom: max(14px, env(safe-area-inset-bottom)); display: flex; justify-content: center; gap: 10px; pointer-events: auto; }
    button, a.button { appearance: none; border: 1px solid rgba(255,255,255,.25); border-radius: 16px; padding: 12px 16px; background: rgba(3,18,10,.78); color: white; font: inherit; font-weight: 700; text-decoration: none; backdrop-filter: blur(14px); box-shadow: 0 8px 30px rgba(0,0,0,.25); }
    button:active, a.button:active { transform: scale(.98); }
    #startScreen { position: fixed; inset: 0; z-index: 50; display: grid; place-items: center; padding: 22px; background: radial-gradient(circle at 50% 20%, rgba(37,128,71,.35), transparent 44%), #06110a; }
    .card { width: min(440px, 100%); padding: 22px; border: 1px solid rgba(255,255,255,.14); border-radius: 26px; background: rgba(6,25,14,.88); box-shadow: 0 24px 80px rgba(0,0,0,.42); text-align: center; }
    .poster { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 18px; display: block; margin-bottom: 18px; }
    h1 { font-size: 25px; margin: 0 0 8px; }
    p { margin: 0 0 16px; color: rgba(255,255,255,.76); line-height: 1.55; }
    .start { width: 100%; padding: 15px 18px; border: none; background: #28a85f; font-size: 17px; }
    .hint { margin-top: 12px; font-size: 12px; color: rgba(255,255,255,.55); }
    #errorBox { display: none; position: fixed; inset: auto 14px max(80px, calc(env(safe-area-inset-bottom) + 70px)) 14px; z-index: 60; padding: 14px; border-radius: 16px; background: rgba(125,23,23,.94); color: white; line-height: 1.45; }
    .a-enter-vr, .a-orientation-modal { display: none !important; }
  </style>
  <script>
    AFRAME.registerShader('chromakey', {
      schema: {
        src: { type: 'map', is: 'uniform' },
        keyColor: { type: 'color', is: 'uniform', default: '#047EF7' },
        similarity: { type: 'number', is: 'uniform', default: 0.06 },
        smoothness: { type: 'number', is: 'uniform', default: 0.115 },
        spill: { type: 'number', is: 'uniform', default: 0.85 }
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform sampler2D src;
        uniform vec3 keyColor;
        uniform float similarity;
        uniform float smoothness;
        uniform float spill;
        varying vec2 vUv;

        void main() {
          vec4 tex = texture2D(src, vUv);
          float sumColor = max(tex.r + tex.g + tex.b, 0.0001);
          float sumKey = max(keyColor.r + keyColor.g + keyColor.b, 0.0001);
          vec3 chroma = tex.rgb / sumColor;
          vec3 keyChroma = keyColor / sumKey;
          float dist = distance(chroma, keyChroma);
          float alpha = smoothstep(similarity, similarity + smoothness, dist);
          if (alpha < 0.018) discard;

          vec3 rgb = tex.rgb;
          float blueDominance = max(0.0, rgb.b - max(rgb.r, rgb.g));
          rgb.b -= blueDominance * (1.0 - alpha) * spill;
          gl_FragColor = vec4(rgb, tex.a * alpha);
        }
      `
    });

  </script>
</head>
<body>
  <div id="startScreen">
    <div class="card">
      <img class="poster" src="assets/poster.jpg" alt="ดอกกระเจียวแดง" />
      <h1>AR ดอกกระเจียวแดง</h1>
      <p>กดเริ่ม แล้วหันกล้องไปที่มาร์กเกอร์บนพื้น ดอกกระเจียวจะค่อย ๆ เติบโตและเล่นวนอยู่ที่ตำแหน่งเดิม</p>
      <button id="startButton" class="start" type="button">เริ่มเปิดกล้อง AR</button>
      <div class="hint">ใช้ Chrome บน Android หรือ Safari บน iPhone และอนุญาตสิทธิ์กล้อง</div>
    </div>
  </div>

  <div class="ui" aria-live="polite">
    <div class="topbar"><div id="status" class="status">กำลังเตรียมกล้อง…</div></div>
    <div class="controls">
      <button id="replayButton" type="button">เล่นใหม่</button>
      <a class="button" href="marker.html" target="_blank" rel="noopener">ดูมาร์กเกอร์</a>
    </div>
  </div>
  <div id="errorBox"></div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="alpha: true; antialias: true; colorManagement: true; precision: medium; logarithmicDepthBuffer: true"
    arjs="sourceType: webcam; trackingMethod: best; debugUIEnabled: false; cameraParametersUrl: https://ar-js-org.github.io/AR.js/three.js/data/data/camera_para.dat; maxDetectionRate: 30; canvasWidth: 640; canvasHeight: 480;"
  >
    <a-assets timeout="30000">
      <video id="flowerVideo" src="assets/siam-tulip-loop.mp4" preload="auto" loop muted playsinline webkit-playsinline crossorigin="anonymous"></video>
    </a-assets>

    <a-marker id="flowerMarker" preset="hiro" emitevents="true" smooth="true" smooth-count="12" smooth-tolerance="0.01" smooth-threshold="4">
      <a-entity id="flowerRoot" position="0 0 0">
        <a-plane
          id="flowerPlane"
          position="0 0.52 0"
          width="1.62"
          height="0.91"
          material="shader: chromakey; src: #flowerVideo; keyColor: #047EF7; similarity: 0.060; smoothness: 0.115; spill: 0.85; transparent: true; side: double; depthWrite: false"
        ></a-plane>
      </a-entity>
    </a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const startScreen = document.getElementById('startScreen');
    const startButton = document.getElementById('startButton');
    const replayButton = document.getElementById('replayButton');
    const marker = document.getElementById('flowerMarker');
    const video = document.getElementById('flowerVideo');
    const status = document.getElementById('status');
    const errorBox = document.getElementById('errorBox');
    let started = false;
    let markerVisible = false;
    let resetTimer = null;

    function setStatus(text, found = false) {
      status.textContent = text;
      status.classList.toggle('found', found);
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.style.display = 'block';
    }

    async function safePlay({ restart = false } = {}) {
      try {
        if (restart) video.currentTime = 0;
        await video.play();
      } catch (error) {
        showError('วิดีโอเริ่มเล่นไม่ได้ กรุณาแตะปุ่ม “เล่นใหม่” อีกครั้ง');
        console.error(error);
      }
    }

    startButton.addEventListener('click', async () => {
      started = true;
      errorBox.style.display = 'none';
      // Mobile browsers need a direct tap before a video can become a WebGL texture.
      await safePlay({ restart: true });
      video.pause();
      startScreen.style.display = 'none';
      setStatus('หันกล้องไปที่มาร์กเกอร์บนพื้น');
    });

    replayButton.addEventListener('click', () => {
      if (!started) return;
      safePlay({ restart: true });
    });

    marker.addEventListener('markerFound', () => {
      markerVisible = true;
      clearTimeout(resetTimer);
      setStatus('พบจุด AR แล้ว — ถือกล้องให้นิ่ง', true);
      if (started) safePlay({ restart: video.paused || video.currentTime < 0.2 });
    });

    marker.addEventListener('markerLost', () => {
      markerVisible = false;
      setStatus('มาร์กเกอร์หลุดจากกล้อง — หันกลับไปที่พื้น');
      clearTimeout(resetTimer);
      resetTimer = setTimeout(() => {
        if (!markerVisible) {
          video.pause();
          video.currentTime = 0;
        }
      }, 900);
    });

    window.addEventListener('arjs-video-loaded', () => {
      if (!started) setStatus('กล้องพร้อมแล้ว — กดเริ่ม');
    });

    window.addEventListener('error', (event) => {
      const text = String(event.message || '');
      if (text.toLowerCase().includes('camera') || text.toLowerCase().includes('permission')) {
        showError('เปิดกล้องไม่ได้ กรุณาอนุญาตสิทธิ์กล้อง แล้วรีเฟรชหน้าเว็บ');
      }
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) video.pause();
      else if (started && markerVisible) safePlay();
    });
  </script>
</body>
</html>
